# STARTUP ORDER REQUIRED: this file must be started AFTER docker-compose-observability.yml,
# docker-compose-db.yml, and docker-compose-kafka.yml.
#
# Services here reference otel-collector (OTLP endpoint), postgres, and broker from those files.
# There is no depends_on for cross-file services (podman-compose does not support it).
# Use `task compose-up` which starts all files in the correct order, or manually:
#   1. docker-compose -f docker-compose-observability.yml up -d
#   2. docker-compose -f docker-compose-db.yml up -d
#   3. docker-compose -f docker-compose-kafka.yml up -d
#   4. docker-compose -f docker-compose-apps.yml up -d

x-common-apps-env: &common-apps-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: otlp
  OTEL_LOGS_EXPORTER: otlp
  OTEL_PROPAGATORS: "tracecontext,baggage"
  OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: "true"
  OTEL_PYTHON_LOG_CORRELATION: "true"
  # ${HOSTNAME} is set by Docker/Podman at container start — works on both runtimes.
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment.name=local,service.version=0.1.0,service.instance.id=${HOSTNAME}"
  LOG_LEVEL: INFO
  ERROR_RATE: "0.1"

services:
  ms-customer:
    build:
      context: ..
      dockerfile: ms-customer/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-customer
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-customer
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      INTERVAL_SECONDS: 5
    restart: unless-stopped
    networks:
      - otel-network

  ms-supplier:
    build:
      context: ..
      dockerfile: ms-supplier/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-supplier
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-supplier
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      INTERVAL_SECONDS: 5
    restart: unless-stopped
    networks:
      - otel-network

  ms-order:
    build:
      context: ..
      dockerfile: ms-order/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-order
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-order
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-yourpassword}@postgres:5432/order_db
    restart: unless-stopped
    networks:
      - otel-network

  ms-stock:
    build:
      context: ..
      dockerfile: ms-stock/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-stock
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-stock
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-yourpassword}@postgres:5432/stock_db
    restart: unless-stopped
    networks:
      - otel-network

  ms-ordercheck:
    build:
      context: ..
      dockerfile: ms-ordercheck/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-ordercheck
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-ordercheck
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      API_URL: http://ms-order:5000
    depends_on:
      ms-order:
        condition: service_started
    restart: unless-stopped
    networks:
      - otel-network

  ms-suppliercheck:
    build:
      context: ..
      dockerfile: ms-suppliercheck/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-suppliercheck
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-suppliercheck
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      API_URL: http://ms-stock:5001
    depends_on:
      ms-stock:
        condition: service_started
    restart: unless-stopped
    networks:
      - otel-network

  ms-ordermanagement:
    build:
      context: ..
      dockerfile: ms-ordermanagement/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-ordermanagement
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-ordermanagement
      API_URL_ORDERS: http://ms-order:5000
      API_URL_STOCKS: http://ms-stock:5001
      INTERVAL_SECONDS: 5
    depends_on:
      ms-order:
        condition: service_started
      ms-stock:
        condition: service_started
    restart: unless-stopped
    networks:
      - otel-network

networks:
  otel-network:
    external: true
