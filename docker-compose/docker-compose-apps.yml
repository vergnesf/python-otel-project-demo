# STARTUP ORDER REQUIRED: this file must be started AFTER docker-compose-observability.yml,
# docker-compose-db.yml, and docker-compose-kafka.yml.
#
# Services here reference otel-collector (OTLP endpoint), postgres, and broker from those files.
# There is no depends_on for cross-file services (podman-compose does not support it).
# Use `task compose-up` which starts all files in the correct order, or manually:
#   1. docker-compose -f docker-compose-observability.yml up -d
#   2. docker-compose -f docker-compose-db.yml up -d
#   3. docker-compose -f docker-compose-kafka.yml up -d
#   4. docker-compose -f docker-compose-apps.yml up -d

x-common-apps-env: &common-apps-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: otlp
  OTEL_LOGS_EXPORTER: otlp
  OTEL_PROPAGATORS: "tracecontext,baggage"
  OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: "true"
  OTEL_PYTHON_LOG_CORRELATION: "true"
  # ${HOSTNAME} is set by Docker/Podman at container start — works on both runtimes.
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment.name=local,service.version=0.1.0,service.instance.id=${HOSTNAME},service.namespace=keeper"
  LOG_LEVEL: INFO
  ERROR_RATE: "0.1"

services:
  ms-brewer:
    build:
      context: ..
      dockerfile: ms-brewer/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-brewer
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-brewer
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      INTERVAL_SECONDS: 5
    healthcheck:
      test: ["CMD-SHELL", "grep -rl brewer_producer /proc/*/cmdline 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - otel-network

  ms-retailer:
    build:
      context: ..
      dockerfile: ms-retailer/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-retailer
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-retailer
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      INTERVAL_SECONDS: 10
    healthcheck:
      test: ["CMD-SHELL", "grep -rl retailer_producer /proc/*/cmdline 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - otel-network

  ms-supplier:
    build:
      context: ..
      dockerfile: ms-supplier/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-supplier
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-supplier
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      INTERVAL_SECONDS: 5
    healthcheck:
      test: ["CMD-SHELL", "grep -rl supplier_producer /proc/*/cmdline 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - otel-network

  ms-brewery:
    build:
      context: ..
      dockerfile: ms-brewery/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-brewery
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-brewery
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-yourpassword}@postgres:5432/brew_db
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - otel-network

  ms-cellar:
    build:
      context: ..
      dockerfile: ms-cellar/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-cellar
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-cellar
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-yourpassword}@postgres:5432/cellar_db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - otel-network

  ms-brewcheck:
    build:
      context: ..
      dockerfile: ms-brewcheck/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-brewcheck
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-brewcheck
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      API_URL: http://ms-brewery:5000
    depends_on:
      ms-brewery:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -rl brewcheck_consumer /proc/*/cmdline 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - otel-network

  ms-ingredientcheck:
    build:
      context: ..
      dockerfile: ms-ingredientcheck/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-ingredientcheck
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-ingredientcheck
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      API_URL: http://ms-cellar:5001
    depends_on:
      ms-cellar:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -rl ingredientcheck_consumer /proc/*/cmdline 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - otel-network

  ms-brewmaster:
    build:
      context: ..
      dockerfile: ms-brewmaster/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-brewmaster
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-brewmaster
      API_URL_BREWS: http://ms-brewery:5000
      API_URL_CELLAR: http://ms-cellar:5001
      INTERVAL_SECONDS: 5
    depends_on:
      ms-brewery:
        condition: service_healthy
      ms-cellar:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -rl brewmaster /proc/*/cmdline 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - otel-network

  ms-beerstock:
    build:
      context: ..
      dockerfile: ms-beerstock/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-beerstock
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-beerstock
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-yourpassword}@postgres:5432/beerstock_db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - otel-network

  ms-dispatch:
    build:
      context: ..
      dockerfile: ms-dispatch/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-dispatch
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-dispatch
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      API_URL_BEERSTOCK: http://ms-beerstock:5002
    depends_on:
      ms-beerstock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -rl dispatch_consumer /proc/*/cmdline 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - otel-network

  ms-quality-control:
    build:
      context: ..
      dockerfile: ms-quality-control/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-quality-control
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-quality-control
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      API_URL: http://ms-brewery:5000
      REJECT_RATE: "0.1"
    depends_on:
      ms-brewery:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -rl quality_consumer /proc/*/cmdline 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - otel-network

  ms-fermentation:
    build:
      context: ..
      dockerfile: ms-fermentation/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        IMG_PYTHON: ${IMG_PYTHON_BASE}
    container_name: ms-fermentation
    environment:
      <<: *common-apps-env
      OTEL_SERVICE_NAME: ms-fermentation
      API_URL_BREWS: http://ms-brewery:5000
      FERMENTATION_SECONDS: 30
      INTERVAL_SECONDS: 10
    depends_on:
      ms-brewery:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -rl fermentation_worker /proc/*/cmdline 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - otel-network

networks:
  otel-network:
    external: true
