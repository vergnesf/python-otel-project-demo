version: '3'

dotenv: ['.env']

vars:
  # All service directories — used by lint and tools-format (ruff).
  # Includes agent/benchmark services that have no smoke tests.
  PROJECTS: >-
    agent-logs agent-metrics agent-orchestrator agent-traces agent-ui
    agent-traduction benchmark common-ai common-models
    customer order ordercheck ordermanagement stock supplier suppliercheck

  # Business services with runnable Python processes and a tests/ directory.
  # Shared libraries (common-models, common-ai) are excluded.
  # Scope: test-lint and test-unit.
  KEEPER_SERVICES: customer order ordercheck ordermanagement stock supplier suppliercheck

  # Subset with a container healthcheck defined in docker-compose-apps.yml.
  # Only Flask REST APIs (order, stock) have healthchecks.
  # WARNING: only add a service here if docker-compose-apps.yml defines a HEALTHCHECK for it.
  HEALTHCHECK_SERVICES: order stock

  # Ollama models to pull
  MODELS: mistral:7b llama3.2:3b qwen3:0.6b granite4:3b mistral-nemo:12b qwen2.5:7b phi4:14b

  # Detect container runtime (podman preferred over docker)
  COMPOSE_BASE:
    sh: |
      if command -v podman >/dev/null 2>&1; then echo "podman-compose"
      elif command -v docker >/dev/null 2>&1; then echo "docker compose"
      else echo "podman-compose"; fi

  # When running inside a devcontainer with a Podman socket, bind mount paths must be host paths.
  # Detect the host path from the btrfs subvolume source (format: /dev/xxx[/host/path]).
  HOST_PWD:
    sh: |
      src=$(findmnt -n -o SOURCE "$(pwd)" 2>/dev/null || true)
      if echo "$src" | grep -q '\['; then
        echo "$src" | sed 's|.*\[||;s|\].*||'
      else
        echo "$(pwd)"
      fi

tasks:
  default:
    desc: "List all available tasks"
    silent: true
    cmds:
      - task --list

  # ---------------------------------------------------------------------------
  # Stack lifecycle
  # ---------------------------------------------------------------------------

  compose-up:
    desc: "Start full stack: observability → db → kafka → ai-tools → ai → apps → traefik"
    cmds:
      - echo "Bringing up observability, db, kafka, ai-tools, ai, then apps (in that order)..."
      - echo "Ensuring network otel-network exists..."
      - |
        if command -v docker >/dev/null 2>&1; then
          docker network inspect otel-network >/dev/null 2>&1 || docker network create otel-network
        elif command -v podman >/dev/null 2>&1; then
          podman network inspect otel-network >/dev/null 2>&1 || podman network create otel-network
        fi
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-observability.yml up -d
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-db.yml up -d
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-kafka.yml up -d
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-ai-tools.yml up -d
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-ai.yml up -d --build
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-apps.yml up -d --build
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-traefik.yml up -d

  compose-down:
    desc: "Stop full stack in reverse order: apps → ai → ai-tools → kafka → db → observability → traefik"
    cmds:
      - echo "Tearing down apps, ai, ai-tools, kafka, db, then observability (reverse order)..."
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-apps.yml down
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-ai.yml down
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-ai-tools.yml down
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-kafka.yml down
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-db.yml down
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-observability.yml down
      - env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env -f docker-compose/docker-compose-traefik.yml down

  # ---------------------------------------------------------------------------
  # Code quality
  # ---------------------------------------------------------------------------

  lint:
    desc: "Lint all projects with ruff (PROJECTS: all 16 dirs including agents)"
    cmds:
      - echo "Linting all projects with ruff..."
      - uvx ruff check {{.PROJECTS}}

  tools-format:
    desc: "Format all projects with ruff format (runs from repo root, applies root pyproject.toml)"
    cmds:
      - echo "Formatting all projects with ruff format..."
      - uvx ruff format {{.PROJECTS}}

  # ---------------------------------------------------------------------------
  # Test pipeline (sequential: lint → unit → integration)
  # ---------------------------------------------------------------------------

  test:
    desc: "Run full test pipeline: test-lint → test-unit → test-integration (sequential)"
    cmds:
      - task: test-lint
      - task: test-unit
      - task: test-integration

  test-lint:
    desc: "Lint KEEPER services only (7 business services, subset of lint)"
    cmds:
      - echo "Linting KEEPER services..."
      - uvx ruff check {{.KEEPER_SERVICES}}

  test-unit:
    desc: "Run pytest smoke tests for all KEEPER services (no Docker required)"
    cmds:
      - echo "Running smoke tests for KEEPER services..."
      - |
        failed=0; total_tests=0
        for svc in {{.KEEPER_SERVICES}}; do
          printf "  %-20s" "$svc"
          output=$(cd "$svc" 2>&1 && timeout 60 uv run pytest tests/ -q --tb=short 2>&1)
          exitcode=$?
          if [ $exitcode -eq 0 ]; then
            tcount=$(echo "$output" | sed -n 's/^\([0-9]\+\) passed.*/\1/p' | head -1)
            total_tests=$((total_tests + ${tcount:-0}))
            echo "✓ (${tcount:-?} passed)"
          elif [ $exitcode -eq 124 ]; then
            echo "✗ (timeout >60s)"
            printf "  === %s ===\n" "$svc"
            echo "$output" | sed 's/^/  /'
            failed=$((failed+1))
          elif [ $exitcode -eq 5 ]; then
            echo "✗ (no tests found — add tests to tests/)"
            printf "  === %s ===\n" "$svc"
            echo "$output" | sed 's/^/  /'
            failed=$((failed+1))
          else
            echo "✗"
            printf "  === %s ===\n" "$svc"
            echo "$output" | sed 's/^/  /'
            failed=$((failed+1))
          fi
        done
        if [ $failed -eq 0 ]; then
          echo "All smoke tests passed ($total_tests tests)"
        else
          echo "$failed service(s) failed; $total_tests tests passed in services that passed"
          exit 1
        fi

  test-integration:
    desc: "Check container health for order and stock (requires running stack)"
    cmds:
      - echo "Checking container health for {{.HEALTHCHECK_SERVICES}} (requires running stack)..."
      - |
        COMPOSE_CMD="env PWD={{.HOST_PWD}} {{.COMPOSE_BASE}} --env-file {{.USER_WORKING_DIR}}/.env"
        DOCKER_AVAILABLE=$(command -v docker >/dev/null 2>&1 && echo true || echo false)
        PODMAN_AVAILABLE=$(command -v podman >/dev/null 2>&1 && echo true || echo false)
        if [ "$DOCKER_AVAILABLE" = "false" ] && [ "$PODMAN_AVAILABLE" = "false" ]; then
          echo "  No container runtime found (docker/podman) — skipping integration checks"
          exit 0
        fi
        if ! $COMPOSE_CMD -f docker-compose/docker-compose-apps.yml ps {{.HEALTHCHECK_SERVICES}} 2>/dev/null | grep -qE "\b(Up|running|healthy|unhealthy|starting)\b"; then
          echo "  Services {{.HEALTHCHECK_SERVICES}} not running — skipping integration checks (run task compose-up first)"
          exit 0
        fi
        failed=0
        for svc in {{.HEALTHCHECK_SERVICES}}; do
          printf "  %-20s" "$svc"
          status=$($COMPOSE_CMD -f docker-compose/docker-compose-apps.yml ps "$svc" --format json 2>/dev/null | tr -d '\n' | sed -n 's/.*"Health":"\([^"]*\)".*/\1/p')
          status=${status:-unknown}
          if [ "$status" = "healthy" ]; then
            echo "✓ healthy"
          elif [ "$status" = "unknown" ]; then
            echo "✗ unknown (no HEALTHCHECK instruction in docker-compose-apps.yml for $svc)"
            failed=$((failed+1))
          else
            echo "✗ $status"
            failed=$((failed+1))
          fi
        done
        if [ $failed -eq 0 ]; then echo "All services healthy"; else echo "$failed service(s) unhealthy"; exit 1; fi

  # ---------------------------------------------------------------------------
  # AI models
  # ---------------------------------------------------------------------------

  models-init:
    desc: "Pull Ollama AI models into running ollama container (docker or podman)"
    cmds:
      - echo "Detecting runtime and looking for running container 'ollama'..."
      - |
        RUNTIME=""
        if command -v docker >/dev/null 2>&1 && docker ps --format '{{`{{.Names}}`}}' | grep -xq ollama; then RUNTIME=docker; fi
        if [ -z "$RUNTIME" ] && command -v podman >/dev/null 2>&1 && podman ps --format '{{`{{.Names}}`}}' | grep -xq ollama; then RUNTIME=podman; fi
        if [ -z "$RUNTIME" ]; then
          echo "No running 'ollama' container found (docker or podman). Start it first."
          exit 1
        fi
        echo "Using $RUNTIME exec to run pulls"
        for m in {{.MODELS}}; do
          echo "--> Pulling $m"
          if [ "$RUNTIME" = "docker" ]; then
            docker exec ollama sh -c "ollama pull $m" || echo "pull failed for $m"
          else
            podman exec ollama sh -c "ollama pull $m" || echo "pull failed for $m"
          fi
        done
        echo "models-init: done"
